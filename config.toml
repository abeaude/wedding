menu_items = [
    {name = "Programme", url = "/programme"},
    {name = "Accès", url = "/acces"},
    {name = "Hébergements", url = "/hebergements"},
    {name = "FAQ", url = "/faq"},
    {name = "RSVP", url = "/rsvp"},
    {name = "Cadeaux", url = "/cadeaux"},
]