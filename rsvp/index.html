    <div id="spinner-overlay" style="
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
    ">
        <div class="spinner-ring"></div>
        <span style="font-size: 14px; color: #666;">Loading…</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const mobileToggle = document.querySelector('.mobile-menu-toggle');
            const siteNav = document.querySelector('.site-nav');
            const siteHeader = document.querySelector('.site-header');
            const body = document.body;

            if (mobileToggle && siteNav && siteHeader) {
                mobileToggle.addEventListener('click', function () {
                    siteNav.classList.toggle('nav-open');
                    mobileToggle.classList.toggle('active');
                    siteHeader.classList.toggle('nav-expanded');
                    body.classList.toggle('nav-open');
                });

                // Close menu when clicking on a link
                const navLinks = siteNav.querySelectorAll('.page-link');
                navLinks.forEach(link => {
                    link.addEventListener('click', function () {
                        siteNav.classList.remove('nav-open');
                        mobileToggle.classList.remove('active');
                        siteHeader.classList.remove('nav-expanded');
                        body.classList.remove('nav-open');
                    });
                });

                // Close menu when clicking outside
                document.addEventListener('click', function (e) {
                    if (!mobileToggle.contains(e.target) && !siteNav.contains(e.target)) {
                        siteNav.classList.remove('nav-open');
                        mobileToggle.classList.remove('active');
                        siteHeader.classList.remove('nav-expanded');
                        body.classList.remove('nav-open');
                    }
                });
            }
        });
    </script>
    <script>
        const BIN_ID = "69be5dddaa77b81da9051015";
        const API_KEY = "$2a$10$SdVYTiENyPMgxVM39EW3PuaAOHTcmFkV2ouhu3V96k1O6qshdV/cq";

        let globalState = {};
        let localOverrides = {}; // session-only changes

        function showSpinner() {
            const el = document.getElementById('spinner-overlay');
            el.style.display = 'flex';
        }

        function hideSpinner() {
            document.getElementById('spinner-overlay').style.display = 'none';
        }

        async function fetchState() {
            showSpinner();
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Access-Key": API_KEY }
                });
                const data = await res.json();
                globalState = data.record || {};
            } finally {
                hideSpinner(); // always hides, even if fetch throws
            }
        }

        async function saveState() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Access-Key": API_KEY
                },
                body: JSON.stringify(globalState)
            });
        }

        function updateUI() {
            document.querySelectorAll('.card').forEach(card => {
                const id = card.dataset.id;
                const btn = card.querySelector('.take-btn');
                const badge = card.querySelector('.status-badge');

                const taken = localOverrides[id] ?? globalState[id];

                badge.classList.remove('status-available', 'status-taken');
                if (id != "noces-1") {
                    if (taken) {
                        badge.classList.add('status-taken');
                        btn.disabled = true;
                    } else {
                        badge.classList.add('status-available');
                        btn.disabled = false;
                    }
                }

            });
        }

        function setupActions() {
            document.querySelectorAll('.card').forEach(card => {
                const id = card.dataset.id;
                const btn = card.querySelector('.take-btn');

                btn.addEventListener('click', async () => {
                    // already taken globally → block
                    if (globalState[id]) return;

                    // toggle locally
                    localOverrides[id] = !localOverrides[id];

                    updateUI();

                    // confirm reservation
                    if (localOverrides[id]) {
                        const confirmTake = confirm("Confirmer la réservation ?");
                        if (confirmTake) {
                            if (id != "noces-1") {
                                globalState[id] = true;
                            } else {
                                globalState[id] += 1;
                            }

                            await saveState();
                            updateUI();
                        } else {
                            if (id != "noces-1") {
                                localOverrides[id] = false;
                            }
                            updateUI();
                        }
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const noce_card = document.querySelector("div[data-id=noces-1]")
            const noce_btn = noce_card.querySelector('.take-btn');
            const noce_badge = noce_card.querySelector('.status-badge');
            noce_btn.textContent = "Participer"
            noce_badge.classList.remove('status-available', 'status-taken');
            noce_badge.classList.add('counter');
            await fetchState();
            setupActions();
            updateUI();
        });
    </script>
</body>
