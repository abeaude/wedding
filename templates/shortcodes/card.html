<div class="card">
    <a href="{{ url }}" target="_blank" rel="noopener noreferrer">
        <div class="card-image">
            <img src="{{ get_url(path=image) }}" alt="{{ alt }}" loading="lazy">
        </div>
        <div class="card-content">
            <p>{{ description }}</p>
        </div>
    </a>
</div>
